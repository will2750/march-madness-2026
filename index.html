// === SCORING SYSTEM ===
// Points per round: doubles each round (R64=10, R32=20, ... CH=320)

const MAX_SCORE = 32*10 + 16*20 + 8*40 + 4*80 + 2*160 + 1*320; // 1920

// Actual tournament results - auto-updated by ESPN scheduled task
// "_" = not yet played, "a" = higher seed side won, "b" = lower seed side won
// Format: East(8+4+2+1) + South(15) + Midwest(15) + West(15) + FF(2) + CH(1) = 63 chars
const actualResultsCode = "ab__aa___________aababa_______abaaaaaa_______a_baba____________";

// AI Bracket picks encoded as bracket code (precomputed from aiPicks data)
const AI_BRACKET_CODE = "abbabaaaaaababaabbabaaaabababbaabaaaaaaaababaabaabaaaaabbababaa";

// Hardcoded friend brackets — add entries like { name: "Friend Name", code: "63-char-code" }

// Score any bracket code against actual results
const scoreBracketCode = (code) => {
  if (!code || code.length < 63) return { score: 0, correct: 0, possible: 0, total: 0, maxScore: MAX_SCORE };
  let score = 0, correct = 0, possible = 0, total = 0;
  const pts = [];
  for (let r = 0; r < 4; r++) {
    for (let i = 0; i < 8; i++) pts.push(10);
    for (let i = 0; i < 4; i++) pts.push(20);
    for (let i = 0; i < 2; i++) pts.push(40);
    pts.push(80);
  }
  pts.push(160, 160, 320);
  for (let i = 0; i < 63; i++) {
    if (actualResultsCode[i] !== "_") {
      possible += pts[i];
      total++;
      if (code[i] === actualResultsCode[i]) { score += pts[i]; correct++; }
    }
  }
  return { score, correct, possible, total, maxScore: MAX_SCORE };
};

    { seed: 4, teams: ["Kansas", "Nebraska", "Alabama", "Arkansas"], risk: "high", note: "Alabama's Aden Holloway (16.8 PPG, 2nd-leading scorer) arrested on felony marijuana charges (3/16) and SUSPENDED INDEFINITELY by coach Nate Oats — removed from campus. Will NOT play vs Hofstra. Without Holloway, Alabama's offense is gutted. INJURY: Kansas' Darryn Peterson (19.8 PPG, projected #1 pick) missed 11 games with cramping/hamstring — available but fragile. 13-over-4 has happened " + (r64Matchups["13v4"]||0) + "x in 9 yrs. Hofstra vs a Holloway-less Alabama is the biggest upset opportunity in the bracket." },
    { seed: 5, teams: ["St. John's (28-6)", "Vanderbilt (26-8)", "Texas Tech (22-10)", "Wisconsin (24-10)"], risk: "high", note: "INJURY: Texas Tech lost JT Toppin (torn ACL, Feb 17 at Arizona State — 21.8 PPG, 10.8 RPG, led nation in made FGs) for the season. Defense collapsed from 24th to 119th without him. Christian Anderson (19.2 PPG) carries the offense but the defense is gone. Wisconsin has 4 wins over KenPom top-10 teams but is erratic. 12-over-5 hit in 8 of 9 years (" + (r64Matchups["12v5"]||0) + "/" + 36 + "). Akron (29-5) and McNeese (28-5) are dangerous." },
    { seed: 6, teams: ["Louisville (23-10)", "North Carolina", "Tennessee", "BYU"], risk: "high", note: "INJURY MINEFIELD: Louisville's Mikel Brown Jr. (18.2 PPG, 4.7 APG) confirmed OUT for opening weekend — hasn't played since Feb 28. UNC lost Caleb Wilson (19.8 PPG, 9.4 RPG, broken thumb — OUT, 0-2 without him). BYU lost THREE players: Baker (ACL, Nov), Pickens (preseason), Saunders (ACL, Feb) — 2-4 since Saunders went down. 6-vs-11 is the #1 upset matchup (" + (r64Matchups["11v6"]||0) + "/" + 36 + "). South Florida (25-8) and VCU (A-10 champs) are primed. Three of four 6-seeds have major injury issues." },
    { seed: 7, teams: ["UCLA", "Saint Mary's", "Kentucky", "Miami (FL)"], risk: "medium", note: "INJURY UPDATE: UCLA's Dent says he's '100%' and Bilodeau is expected to play — health picture much improved. Kentucky's Quaintance (knee, 4 games all year) not expected back. Saint Mary's is a terrible draw for any 2-seed: 11th-best 3P%, #1 FT% nationally, 7th-best scoring. They're 3-1 in R64 over the last 4 appearances. Kentucky upset by 14-seed Oakland in 2024 and 15-seed Saint Peter's in 2022. 10-over-7 has hit " + (r64Matchups["10v7"]||0) + "x in 9 yrs with at least 1 per tournament." },
    { seed: 8, teams: ["Ohio St.", "Clemson", "Georgia", "Villanova"], risk: "high", note: "8 vs 9 is a coin flip (" + (r64Matchups["9v8"]||0) + "/" + 36 + " upsets). The 8/9 winner vs 1-seed in R32 is one of March's best upset pipelines — it happened in 5 of 9 tournaments (Wisconsin over Villanova '17, Loyola over Illinois '21, UNC over Baylor '22). INJURY: Clemson lost Carter Welling (10.2 PPG, 5.4 RPG, top rebounder, torn ACL in ACC tourney) — Iowa (9) now favored in that 8/9 game." },

  const riskColors = { low: "#198754", medium: "#ffc107", high: "#dc3545" };
  const riskBg = { low: "#d4edda", medium: "#fff3cd", high: "#f8d7da" };

  // Key bracket tips derived from data
  const bracketTips = [
    { emoji: "1.", title: "Always pick at least one 12-over-5", stat: `${r64Matchups["12v5"] || 0} upsets in ${NUM_TOURNAMENTS} tourneys (${Math.round(((r64Matchups["12v5"] || 0) / 36) * 100)}% rate)`, detail: "It happened in 8 of 9 tournaments. Only 2017 had no 12-over-5 upsets." },
    { emoji: "2.", title: "Pick one or two 11-over-6 upsets", stat: `${r64Matchups["11v6"] || 0} upsets in ${NUM_TOURNAMENTS} tourneys (${Math.round(((r64Matchups["11v6"] || 0) / 36) * 100)}% rate)`, detail: "The 11 vs 6 matchup produces the most R64 upsets. Multiple 11-seeds win every year." },
    { emoji: "3.", title: "Bet on a 15-seed winning at least once", stat: `15-seeds have beaten 2-seeds in 3 of the last 9 tournaments`, detail: "Oral Roberts (2021), Saint Peter's (2022), Princeton (2023) - this is now a regular occurrence." },
    { emoji: "4.", title: "Don't trust all four 1-seeds to reach the Elite 8", stat: `1-seeds have been upset ${loserTotals[1] || 0} times total across all rounds`, detail: "On average, ~1.7 top-seeded teams get knocked out per tournament. At least one 1-seed falls before the Final Four." },
    { emoji: "5.", title: "Pick a Cinderella to the Sweet 16", stat: `Seeds 7+ reached the Sweet 16 or further in every tournament`, detail: "In all 9 tournaments, at least one double-digit seed made a deep run. Look for experienced, well-coached mid-majors." },
    { emoji: "6.", title: "The 8/9 vs 1 pipeline is real", stat: `8/9-seeds have beaten 1-seeds in R32 in 5 of 9 tournaments`, detail: "The R32 matchup of 8/9 seed vs 1-seed produces frequent upsets. UNC (2022), Loyola (2021), Wisconsin (2017)." },
    { emoji: "7.", title: "4-seeds are paper tigers", stat: `${(loserTotals[4] || 0)} total upsets of 4-seeds across all rounds`, detail: "4-seeds face dangerous 13-seeds in R64 and battle-tested 5/12 winners in R32. They're frequently overvalued." },
  ];

  // === INTERACTIVE BRACKET STATE ===
  // Build a fresh empty bracket from official bracket data
  const buildFreshBracket = () => {
    const init = {};
    regions.forEach((reg, ri) => {
      const ordered = [
        reg.matchups.find(m => m.hi === 1),
        reg.matchups.find(m => m.hi === 8),
        reg.matchups.find(m => m.hi === 5),
        reg.matchups.find(m => m.hi === 4),
        reg.matchups.find(m => m.hi === 6),
        reg.matchups.find(m => m.hi === 3),
        reg.matchups.find(m => m.hi === 7),
        reg.matchups.find(m => m.hi === 2),
      ];
      init[reg.name] = {
        R64: ordered.map(m => ({ a: { seed: m.hi, team: m.hiTeam }, b: { seed: m.lo, team: m.loTeam }, winner: null })),
        R32: [null, null, null, null],
        S16: [null, null],
        E8: [null],
      };
    });
    init.FF = [null, null];
    init.CH = [null];
    init.champion = null;
    return init;
  };

  // Encode bracket picks as a compact string for sharing
  const encodeBracket = (b) => {
    // For each game with a winner, store "a" or "b" (which team won)
    let code = "";
    regions.forEach(reg => {
      b[reg.name].R64.forEach(g => { code += g.winner ? (g.winner.team === g.a.team ? "a" : "b") : "_"; });
      b[reg.name].R32.forEach(g => { code += (g && g.winner) ? (g.winner.team === g.a.team ? "a" : "b") : "_"; });
      b[reg.name].S16.forEach(g => { code += (g && g.winner) ? (g.winner.team === g.a.team ? "a" : "b") : "_"; });
      code += (b[reg.name].E8[0] && b[reg.name].E8[0].winner) ? (b[reg.name].E8[0].winner.team === b[reg.name].E8[0].a.team ? "a" : "b") : "_";
    });
    b.FF.forEach(g => { code += (g && g.winner) ? (g.winner.team === g.a.team ? "a" : "b") : "_"; });
    code += (b.CH[0] && b.CH[0].winner) ? (b.CH[0].winner.team === b.CH[0].a.team ? "a" : "b") : "_";
    return code;
  };

  // Decode a bracket code and replay picks onto a fresh bracket
  const decodeBracket = (code) => {
    if (!code || code.length < 63) return null;
    const fresh = buildFreshBracket();
    let idx = 0;
    try {
      regions.forEach(reg => {
        // R64: 8 games
        for (let gi = 0; gi < 8; gi++) {
          const ch = code[idx++];
          if (ch === "a" || ch === "b") {
            const team = ch === "a" ? fresh[reg.name].R64[gi].a : fresh[reg.name].R64[gi].b;
            fresh[reg.name].R64[gi].winner = team;
            const r32Idx = Math.floor(gi / 2);
            const slot = gi % 2 === 0 ? "a" : "b";
            if (!fresh[reg.name].R32[r32Idx]) fresh[reg.name].R32[r32Idx] = { a: null, b: null, winner: null };
            fresh[reg.name].R32[r32Idx][slot] = team;
          }
        }
        // R32: 4 games
        for (let gi = 0; gi < 4; gi++) {
          const ch = code[idx++];
          if (ch === "a" || ch === "b") {
            const g = fresh[reg.name].R32[gi];
            if (g && g.a && g.b) {
              const team = ch === "a" ? g.a : g.b;
              g.winner = team;
              const s16Idx = Math.floor(gi / 2);
              const slot = gi % 2 === 0 ? "a" : "b";
              if (!fresh[reg.name].S16[s16Idx]) fresh[reg.name].S16[s16Idx] = { a: null, b: null, winner: null };
              fresh[reg.name].S16[s16Idx][slot] = team;
            }
          }
        }
        // S16: 2 games
        for (let gi = 0; gi < 2; gi++) {
          const ch = code[idx++];
          if (ch === "a" || ch === "b") {
            const g = fresh[reg.name].S16[gi];
            if (g && g.a && g.b) {
              const team = ch === "a" ? g.a : g.b;
              g.winner = team;
              const slot = gi === 0 ? "a" : "b";
              if (!fresh[reg.name].E8[0]) fresh[reg.name].E8[0] = { a: null, b: null, winner: null };
              fresh[reg.name].E8[0][slot] = team;
            }
          }
        }
        // E8: 1 game
        const ch = code[idx++];
        if (ch === "a" || ch === "b") {
          const g = fresh[reg.name].E8[0];
          if (g && g.a && g.b) {
            const team = ch === "a" ? g.a : g.b;
            g.winner = team;
            const ffIdx = (reg.name === "East" || reg.name === "South") ? 0 : 1;
            const ffSlot = (reg.name === "East" || reg.name === "Midwest") ? "a" : "b";
            if (!fresh.FF[ffIdx]) fresh.FF[ffIdx] = { a: null, b: null, winner: null };
            fresh.FF[ffIdx][ffSlot] = team;
          }
        }
      });
      // FF: 2 games
      for (let gi = 0; gi < 2; gi++) {
        const ch = code[idx++];
        if (ch === "a" || ch === "b") {
          const g = fresh.FF[gi];
          if (g && g.a && g.b) {
            const team = ch === "a" ? g.a : g.b;
            g.winner = team;
            const slot = gi === 0 ? "a" : "b";
            if (!fresh.CH[0]) fresh.CH[0] = { a: null, b: null, winner: null };
            fresh.CH[0][slot] = team;
          }
        }
      }
      // CH: 1 game
      const chCh = code[idx++];
      if (chCh === "a" || chCh === "b") {
        const g = fresh.CH[0];
        if (g && g.a && g.b) {
          const team = chCh === "a" ? g.a : g.b;
          g.winner = team;
          fresh.champion = team;
        }
      }
    } catch(e) { return null; }
    return fresh;
  };

  const [bracket, setBracket] = useState(() => {
    // 1. Check URL for shared bracket
    try {
      const params = new URLSearchParams(window.location.search);
      const shared = params.get("b");
      const sharedName = params.get("n");
      if (shared) {
        const decoded = decodeBracket(shared);
        if (decoded) {
          if (sharedName) decoded._viewingName = decodeURIComponent(sharedName);
          decoded._isShared = true;
          return decoded;
        }
      }
    } catch(e) {}
    // 2. Check localStorage for saved bracket
    try {
      const saved = localStorage.getItem("mm_bracket_2026");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.East) return parsed;
      }
    } catch(e) {}
    // 3. Fresh bracket
    return buildFreshBracket();
  });

  // Save bracket to localStorage whenever it changes
  useEffect(() => {
    if (bracket._isShared) return; // Don't overwrite local data when viewing shared
    try {
      localStorage.setItem("mm_bracket_2026", JSON.stringify(bracket));
    } catch(e) {}
  }, [bracket]);

  // Save name to localStorage
  useEffect(() => {
    try { localStorage.setItem("mm_bracket_name", userName); } catch(e) {}
  }, [userName]);

  // Generate share URL
  const getShareUrl = () => {
    const code = encodeBracket(bracket);
    const base = window.location.origin + window.location.pathname;
    const nameParam = userName ? `&n=${encodeURIComponent(userName)}` : "";
    return `${base}?b=${code}${nameParam}`;
  };

  const copyShareLink = () => {
    const url = getShareUrl();
    navigator.clipboard.writeText(url).then(() => {
      setShowShareMsg(true);
      setTimeout(() => setShowShareMsg(false), 2500);
    }).catch(() => {
      // Fallback
      const ta = document.createElement("textarea");
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setShowShareMsg(true);
      setTimeout(() => setShowShareMsg(false), 2500);
    });
  };

  // Load your own bracket (clear shared view)
  const loadMyBracket = () => {
    try {
      const saved = localStorage.getItem("mm_bracket_2026");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.East) { setBracket(parsed); return; }
      }
    } catch(e) {}
    setBracket(buildFreshBracket());
    // Clear URL params
    window.history.replaceState({}, "", window.location.pathname);
  };

  const pickWinner = (region, round, gameIdx, team) => {
    setBracket(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (round === "R64") {
        next[region].R64[gameIdx].winner = team;
        // Auto-populate R32 matchup
        const r32Idx = Math.floor(gameIdx / 2);
        const slot = gameIdx % 2 === 0 ? "a" : "b";
        if (!next[region].R32[r32Idx]) next[region].R32[r32Idx] = { a: null, b: null, winner: null };
        next[region].R32[r32Idx][slot] = team;
        // Clear downstream if pick changed
        next[region].R32[r32Idx].winner = null;
        const s16Idx = Math.floor(r32Idx / 2);
        const s16Slot = r32Idx % 2 === 0 ? "a" : "b";
        if (next[region].S16[s16Idx]) { next[region].S16[s16Idx][s16Slot] = null; next[region].S16[s16Idx].winner = null; }
        if (next[region].E8[0]) { next[region].E8[0] = { a: null, b: null, winner: null }; }
      } else if (round === "R32") {
        next[region].R32[gameIdx].winner = team;
        const s16Idx = Math.floor(gameIdx / 2);
        const slot = gameIdx % 2 === 0 ? "a" : "b";
        if (!next[region].S16[s16Idx]) next[region].S16[s16Idx] = { a: null, b: null, winner: null };
        next[region].S16[s16Idx][slot] = team;
        next[region].S16[s16Idx].winner = null;
        if (next[region].E8[0]) { next[region].E8[0] = { a: null, b: null, winner: null }; }
      } else if (round === "S16") {
        next[region].S16[gameIdx].winner = team;
        const slot = gameIdx === 0 ? "a" : "b";
        if (!next[region].E8[0]) next[region].E8[0] = { a: null, b: null, winner: null };
        next[region].E8[0][slot] = team;
        next[region].E8[0].winner = null;
      } else if (round === "E8") {
        next[region].E8[0].winner = team;
        // Feed into Final Four
        const ffIdx = (region === "East" || region === "South") ? 0 : 1;
        const ffSlot = (region === "East" || region === "Midwest") ? "a" : "b";
        if (!next.FF[ffIdx]) next.FF[ffIdx] = { a: null, b: null, winner: null };
        next.FF[ffIdx][ffSlot] = team;
        next.FF[ffIdx].winner = null;
        if (next.CH[0]) next.CH[0] = { a: null, b: null, winner: null };
        next.champion = null;
      } else if (round === "FF") {
        next.FF[gameIdx].winner = team;
        const slot = gameIdx === 0 ? "a" : "b";
        if (!next.CH[0]) next.CH[0] = { a: null, b: null, winner: null };
        next.CH[0][slot] = team;
        next.CH[0].winner = null;
        next.champion = null;
      } else if (round === "CH") {
        next.CH[0].winner = team;
        next.champion = team;
      }
      return next;
    });
  };

  const resetBracket = () => {
    const fresh = buildFreshBracket();
    setBracket(fresh);
    try { localStorage.removeItem("mm_bracket_2026"); } catch(e) {}
    window.history.replaceState({}, "", window.location.pathname);
  };

  // Count total picks made
  const totalPicks = (() => {
    let count = 0;
    regions.forEach(reg => {
      bracket[reg.name].R64.forEach(g => { if (g.winner) count++; });
      bracket[reg.name].R32.forEach(g => { if (g && g.winner) count++; });
      bracket[reg.name].S16.forEach(g => { if (g && g.winner) count++; });
      if (bracket[reg.name].E8[0] && bracket[reg.name].E8[0].winner) count++;
    });
    bracket.FF.forEach(g => { if (g && g.winner) count++; });
    if (bracket.CH[0] && bracket.CH[0].winner) count++;
    return count;
  })();

  // === LEADERBOARD STATE ===
  const [importedBrackets, setImportedBrackets] = useState(() => {
    try {
      const saved = localStorage.getItem("mm_leaderboard_2026");
      return saved ? JSON.parse(saved) : [];

    try { localStorage.setItem("mm_leaderboard_2026", JSON.stringify(importedBrackets)); } catch(e) {}
  }, [importedBrackets]);

  const addImportedBracket = () => {
    let code = importInput.trim();
    let name = importName.trim() || ("Bracket " + (importedBrackets.length + 1));
    try {
      const url = new URL(code);
      const params = new URLSearchParams(url.search);
      code = params.get("b") || code;
      if (params.get("n")) name = decodeURIComponent(params.get("n"));
    } catch(e) {}
    if (code.length >= 63 && /^[ab_]+$/.test(code)) {
      setImportedBrackets(prev => [...prev, { name, code }]);
      setImportInput("");
      setImportName("");
    }
  };

  const removeImportedBracket = (idx) => {
    setImportedBrackets(prev => prev.filter((_, i) => i !== idx));
  };

  // Build the full leaderboard entries list
  const getLeaderboard = () => {
    const entries = [];
    // User's bracket
    const userCode = encodeBracket(bracket);
    if (totalPicks > 0) {
      entries.push({ name: userName || "My Bracket", code: userCode, type: "user", ...scoreBracketCode(userCode) });
    }
    // AI bracket
    entries.push({ name: "AI Prediction", code: AI_BRACKET_CODE, type: "ai", ...scoreBracketCode(AI_BRACKET_CODE) });
    // Hardcoded brackets
    hardcodedBrackets.forEach(b => {
      entries.push({ name: b.name, code: b.code, type: "hardcoded", ...scoreBracketCode(b.code) });
    });
    // Imported brackets
    importedBrackets.forEach(b => {
      entries.push({ name: b.name, code: b.code, type: "imported", ...scoreBracketCode(b.code) });
    });
    // Sort by score desc, then correct picks desc
    entries.sort((a, b) => b.score - a.score || b.correct - a.correct);
    return entries;
  };

  const gamesPlayed = actualResultsCode.replace(/_/g, "").length;

  const tabGroups = [
    { label: "Historical Data", color: "#6c757d", tabs: [
      { key: "byRound", label: "By Round" },
      { key: "vulnerable", label: "Most Vulnerable" },
      { key: "cinderellas", label: "Cinderellas" },
      { key: "heatmap", label: "Heatmap" },
    ]},
    { label: "2026 Analysis", color: "#e94560", tabs: [
      { key: "picks2026", label: "2026 Cheat Sheet" },
      { key: "vulnerable2026", label: "Upset Targets" },
      { key: "survivalOdds", label: "Survival Odds" },
      { key: "regionRank", label: "Region Power" },
      { key: "injuryReport", label: "Injury Report" },
      { key: "h2h", label: "Head-to-Head" },
      { key: "aiPredictions", label: "AI Bracket" },
    ]},
    { label: "Your Bracket", color: "#0d6efd", tabs: [
      { key: "leaderboard", label: "Play the AI" },
      { key: "bracket", label: "My Bracket" },
      { key: "scores", label: "Scores" },
    ]},
  ];
  const tabs = tabGroups.flatMap(g => g.tabs);

  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif", maxWidth: 960, margin: "0 auto", padding: isMobile ? "16px 10px" : "24px 20px", background: "#fafbfc", minHeight: "100vh" }}>
      {/* Header */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
          <div style={{ width: isMobile ? 44 : 52, height: isMobile ? 44 : 52, borderRadius: 10, background: "linear-gradient(135deg, #e94560 0%, #ff8c00 50%, #6f42c1 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#fff", flexShrink: 0, padding: 3, lineHeight: 1 }}>
            <span style={{ fontSize: isMobile ? 8 : 9, fontWeight: 800, letterSpacing: 0.5, textTransform: "uppercase" }}>March</span>
            <span style={{ fontSize: isMobile ? 13 : 16, fontWeight: 900, letterSpacing: -0.5, lineHeight: 1 }}>MAD</span>
            <span style={{ fontSize: isMobile ? 6 : 7, fontWeight: 700, letterSpacing: 0.3, opacity: 0.9 }}>NESS '26</span>
          </div>
          <div>
            <h1 style={{ fontSize: isMobile ? 18 : 24, fontWeight: 800, color: "#1a1a2e", margin: 0, lineHeight: 1.2 }}>
              March Madness Upset Analysis
            </h1>
            <p style={{ color: "#888", fontSize: 13, margin: 0 }}>
              {upsets.length} upsets across all rounds &middot; 9 tournaments (2016-2025, no 2020)
            </p>
          </div>
        </div>

        {/* Round summary chips */}

          // === 6-SEEDS ===
          { seed: 6, team: "Louisville", region: "East", kenPom: 24, injuryFlag: "Mikel Brown Jr. OUT (back, 1st weekend)", survR64: 42, survR32: 16, survS16: 5, survE8: 1, survFF: 0, survCH: 0,

          { seed: 7, team: "UCLA", region: "East", kenPom: 18, injuryFlag: "Dent 100%, Bilodeau expected", survR64: 68, survR32: 36, survS16: 16, survE8: 6, survFF: 2, survCH: 1,

          { seed: 8, team: "Clemson", region: "South", kenPom: 29, injuryFlag: "Carter Welling OUT (torn ACL)", survR64: 40, survR32: 10, survS16: 3, survE8: 1, survFF: 0, survCH: 0,

        // What-If injury overrides: when toggled, recalculate as if player were healthy/out
        const whatIfOverrides = {
          "Alabama": { healthy: { survR64: 80, survR32: 55, survS16: 30, survE8: 14, survFF: 6, survCH: 2, injuryFlag: null, adj: "WITH Holloway: Alabama's elite offense (#3 KenPom) is intact. Still hampered by #67 defense, but Holloway's 43.8% 3P stretches defenses. Viable Sweet 16 team. (Note: Holloway is currently SUSPENDED — this is hypothetical.)" } },

          "Gonzaga": { healthy: { survR64: 92, survR32: 72, survS16: 50, survE8: 30, survFF: 14, survCH: 6, injuryFlag: null, adj: "WITH Huff: Gonzaga's interior is restored (17.8 PPG, 5.6 RPG). Graham Ike + Huff frontcourt is elite. Sweet 16 team with Final Four upside." } },

          "BYU": { healthy: { survR64: 68, survR32: 38, survS16: 18, survE8: 8, survFF: 3, survCH: 1, injuryFlag: null, adj: "WITH Saunders + Baker: BYU's big three is restored plus bench depth. Dybantsa + Saunders + Wright III is a top-20 starting five. Legitimate Sweet 16 contender." } },

          "UCLA": { healthy: { survR64: 75, survR32: 42, survS16: 20, survE8: 8, survFF: 3, survCH: 1, injuryFlag: null, adj: "FULLY HEALTHY: Both Dent and Bilodeau at 100% gives UCLA a complete starting five. UCF becomes manageable and a R32 run is realistic." } },
        };

        const applyWhatIf = (t) => {
          const override = whatIfOverrides[t.team];
          if (!override) return t;
          const toggle = survivalWhatIf[t.team];
          if (!toggle) return t;
          const mod = override[toggle];
          if (!mod) return t;
          return { ...t, ...mod };
        };

        const processedData = survivalData.map(applyWhatIf);

        const roundKeys = ["survR64", "survR32", "survS16", "survE8", "survFF", "survCH"];
        const roundLabels = ["R64", "R32", "S16", "E8", "FF", "CH"];
        const roundColors = ["#6c757d", "#0d6efd", "#198754", "#ffc107", "#dc3545", "#6f42c1"];
        const seedFilter = selectedSeed;
        const filteredData = seedFilter ? processedData.filter(t => t.seed === seedFilter) : processedData;

        return (
          <div>
            <div style={{ marginBottom: 16 }}>
              <p style={{ fontSize: 13, color: "#666", lineHeight: 1.6 }}>
                Estimated probability of each team surviving through each round, combining historical seed performance, KenPom rankings, injuries, and matchup difficulty. Watch the bars fade as the tournament gets harder.
              </p>
            </div>

            {/* Seed filter */}
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 14 }}>
              <button onClick={() => setSelectedSeed(null)} style={{ padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: !seedFilter ? 700 : 500, background: !seedFilter ? "#e94560" : "#e8ecf0", color: !seedFilter ? "#fff" : "#555", border: "none", cursor: "pointer" }}>All Seeds</button>

                  <div key={i} style={{ background: "#fff", borderRadius: 12, boxShadow: "0 2px 6px rgba(0,0,0,0.06)", overflow: "hidden" }}>

                          )}

                              {survivalWhatIf[t.team] === "out" ? "Reset" : "What if star sits?"}
                            </button>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{ marginTop: 16, padding: 14, background: "#e8f4fd", borderRadius: 10, fontSize: 12, lineHeight: 1.6, color: "#0c5460" }}>

            </div>
          </div>
        );
      })()}

      {/* INJURY REPORT */}
      {view === "injuryReport" && (
        <div>

                { team: "Alabama (4)", player: "Aden Holloway", injury: "Felony drug arrest — suspended indefinitely (3/16)", status: "SUSPENDED", impact: 98, details: "Arrested on felony marijuana possession (over a pound found at residence) and failure to affix tax stamp. Coach Nate Oats confirmed Holloway is SUSPENDED INDEFINITELY and removed from campus. 16.8 PPG, 43.8% 3P, All-SEC Third Team — Alabama's best perimeter shooter and 2nd-leading scorer. Will NOT play vs Hofstra. Alabama's tournament viability is in serious doubt." },
                { team: "Duke (1)", player: "Caleb Foster", injury: "Broken foot (surgery)", status: "OUT for tournament", impact: 95, details: "Had surgery on broken right foot. Jon Scheyer says only a 'minuscule' chance of return even if Duke reaches the Final Four. Duke's backup PG is unproven — Cayden Boozer forced to play 37-40 min/game. Team running 7-man rotation without him." },
                { team: "North Carolina (6)", player: "Caleb Wilson", injury: "Broken thumb (practice, March 5)", status: "OUT for tournament", impact: 92, details: "Projected top-5 NBA pick — 19.8 PPG, 9.4 RPG. Broke his thumb during practice on March 5. UNC is 0-2 without him (lost to Duke 76-61, then fell to Clemson 80-79 in ACC tourney). Faces VCU (A-10 champs) as a paper 6-seed." },
                { team: "Gonzaga (3)", player: "Braden Huff", injury: "Dislocated kneecap (Jan 15)", status: "OUT for 1st weekend", impact: 90, details: "Ruled out for R64 and R32 by coach Mark Few. 17.8 PPG, 5.6 RPG, 69.7% on 2P — second-best scorer and top interior presence. Now in week 9 of rehab — 'he is jogging and shooting.' Sweet 16 return possible if Gonzaga survives. Graham Ike carrying the load." },
                { team: "BYU (6)", player: "Richie Saunders", injury: "Torn ACL (Feb 14, vs Colorado)", status: "OUT for season", impact: 88, details: "Second Team All-Big 12 — tore his ACL in the opening minute of BYU's OT win over Colorado. Was one-third of the Cougars' big three with AJ Dybantsa and Robert Wright III. BYU is 2-4 since Saunders went down." },
                { team: "BYU (6)", player: "Dawson Baker", injury: "Torn ACL (November, Thanksgiving)", status: "OUT for season", impact: 70, details: "Key rotation guard tore his ACL on Thanksgiving. This was BYU's first major blow — followed by Nate Pickens (preseason) and then Saunders (February). Three significant roster losses have left BYU dangerously thin behind Dybantsa and Wright III." },
                { team: "Clemson (8)", player: "Carter Welling", injury: "Torn ACL (ACC Tournament vs Wake Forest)", status: "OUT for season", impact: 85, details: "Junior center tore his ACL going to the basket at the end of the first half in Clemson's ACC tourney win over Wake Forest. Led the team in rebounds (5.4 RPG) and blocks (0.8 BPG), also 10.2 PPG. Without their top rebounder and rim protector, Clemson's interior defense takes a massive hit against Iowa." },
                { team: "Texas Tech (5)", player: "JT Toppin", injury: "Torn ACL (Feb 17, at Arizona State)", status: "OUT for season", impact: 85, details: "Led the nation with 234 made FGs — 21.8 PPG, 10.8 RPG, 1.7 BPG. Four-time Big 12 Player of the Week. Defense collapsed from KenPom #24 to #119 without him. Christian Anderson (19.2 PPG) carries the offense but cannot fix the defensive crater." },
                { team: "Louisville (6)", player: "Mikel Brown Jr.", injury: "Back injury (hasn't played since Feb 28)", status: "OUT for 1st weekend", impact: 88, details: "Confirmed OUT for NCAA Tournament opener and potential second-round game. 18.2 PPG, 4.7 APG — second-leading scorer and assists leader. Set program record tying 45-point game vs NC State. Louisville is 7-5 without him (averaging 81.7 PPG vs 88.1 with him). Missed 12 games this season. Without their offensive engine, South Florida (11) is a very live upset." },
                { team: "Michigan (1)", player: "L.J. Cason", injury: "Torn ACL (late regular season)", status: "OUT for season", impact: 55, details: "Key bench contributor averaging 8.4 PPG, 2.4 APG in his breakout sophomore campaign. Tore his ACL late in the season. Michigan is still KenPom #2 and 29-2, but their depth is thinner. Will redshirt next year." },

                <div key={i} style={{ background: "#fff", borderRadius: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: "4px solid #dc3545", padding: isMobile ? "10px 10px" : "12px 16px" }}>
                  <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", alignItems: isMobile ? "flex-start" : "center", gap: isMobile ? 4 : 12, marginBottom: 6 }}>

                      <span style={{ fontWeight: 800, fontSize: 14, color: "#1a1a2e" }}>{inj.player}</span>
                      <span style={{ fontSize: 12, color: "#666", marginLeft: 8 }}>{inj.team}</span>
                    </div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      <span style={{ fontSize: 10, padding: "3px 8px", borderRadius: 8, background: "#fde8e8", color: "#dc3545", fontWeight: 700 }}>{inj.status}</span>
                      <span style={{ fontSize: 10, padding: "3px 8px", borderRadius: 8, background: "#1a1a2e", color: "#fff", fontWeight: 700 }}>Impact: {inj.impact}/100</span>
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>{inj.injury}</div>
                  <div style={{ fontSize: 12, color: "#555", lineHeight: 1.5 }}>{inj.details}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Questionable / Game-Time */}
          <div style={{ marginBottom: 20 }}>

          const kenPomDiff = (pB.kenPom + (pB.injImpact || 0)) - (pA.kenPom + (pA.injImpact || 0));

          const composite = kenPomDiff * 1.2 + marginDiff * 0.5 + sosDiff * 0.3;

                          background: medal || "#e9ecef", color: medal ? "#fff" : "#666",

                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Import Brackets */}
            <div style={{ background: "#fff", borderRadius: 12, padding: 16, marginBottom: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: "#1a1a2e", marginBottom: 8 }}>Import a Bracket</h3>
              <p style={{ fontSize: 12, color: "#666", marginBottom: 12 }}>Paste a shared bracket URL (from the My Bracket tab) to add it to the leaderboard.</p>
              <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", gap: 8 }}>
                <input value={importName} onChange={e => setImportName(e.target.value)} placeholder="Name (optional)"
                  style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #ddd", fontSize: 13, width: isMobile ? "100%" : 140 }} />
                <input value={importInput} onChange={e => setImportInput(e.target.value)} placeholder="Paste bracket URL or code..."
                  style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #ddd", fontSize: 13, flex: 1 }} />
                <button onClick={addImportedBracket}
                  style={{ padding: "8px 16px", borderRadius: 8, background: "#0d6efd", color: "#fff", border: "none", fontWeight: 700, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>
                  Add to Leaderboard
                </button>
              </div>
            </div>

            {/* How It Works */}
            <div style={{ padding: 14, background: "#e8f4fd", borderRadius: 10, fontSize: 12, lineHeight: 1.6, color: "#0c5460" }}>
              <strong>How it works:</strong> Fill out your bracket in the "My Bracket" tab and share the link with friends. They fill out theirs and share back. Paste their URLs here to track everyone on the leaderboard. Scores update automatically as ESPN results come in every 10 minutes. Points double each round: 10 (R64) → 20 (R32) → 40 (S16) → 80 (E8) → 160 (FF) → 320 (Championship).
            </div>
          </div>
        );
      })()}

      {/* INTERACTIVE BRACKET VIEW */}
      {view === "bracket" && (() => {
        const regionColors = { East: "#0d6efd", South: "#dc3545", Midwest: "#198754", West: "#6f42c1" };
        const regionBgs = { East: "#e8f0fe", South: "#fde8e8", Midwest: "#e8f5e9", West: "#f3e8fd" };
        const roundLabels = { R64: "Round of 64", R32: "Round of 32", S16: "Sweet 16", E8: "Elite 8" };

        const TeamBtn = ({ team, isWinner, onClick, disabled }) => {
          if (!team) return <div style={{ padding: "8px 12px", background: "#f0f0f0", borderRadius: 6, fontSize: 12, color: "#bbb", textAlign: "center" }}>TBD</div>;
          return (
            <button onClick={disabled ? undefined : onClick} style={{
              padding: "8px 12px", borderRadius: 6, fontSize: 12, fontWeight: isWinner ? 700 : 500,
              background: isWinner ? "#198754" : "#fff", color: isWinner ? "#fff" : "#333",
              border: isWinner ? "2px solid #198754" : "2px solid #e0e0e0",
              cursor: disabled ? "default" : "pointer", width: "100%", textAlign: "left",
              transition: "all 0.15s", opacity: disabled && !isWinner ? 0.5 : 1,
            }}>
              <span style={{ display: "inline-block", width: 20, height: 20, lineHeight: "20px", borderRadius: "50%", background: isWinner ? "rgba(255,255,255,0.25)" : "#1a1a2e", color: "#fff", textAlign: "center", fontSize: 10, fontWeight: 700, marginRight: 8 }}>{team.seed}</span>
              {team.team}
            </button>
          );
        };

        const GameCard = ({ game, onPick, roundKey }) => {
          if (!game) return null;
          const aWins = game.winner && game.winner.team === game.a.team;
          const bWins = game.winner && game.winner.team === game.b.team;
          return (
            <div style={{ background: "#fff", borderRadius: 8, padding: 8, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", display: "flex", flexDirection: "column", gap: 4 }}>
              <TeamBtn team={game.a} isWinner={aWins} onClick={() => onPick(game.a)} disabled={!game.a || !game.b} />
              <TeamBtn team={game.b} isWinner={bWins} onClick={() => onPick(game.b)} disabled={!game.a || !game.b} />
            </div>
          );
        };

        return (
          <div>
            {/* Shared bracket banner */}
            {bracket._isShared && (
              <div style={{ padding: "12px 16px", background: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)", borderRadius: 10, marginBottom: 16, color: "#fff", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>
                    {bracket._viewingName ? `${bracket._viewingName}'s Bracket` : "Shared Bracket"}
                  </div>
                  <div style={{ fontSize: 11, opacity: 0.8 }}>You're viewing someone else's picks</div>
                </div>
                <button onClick={loadMyBracket} style={{ padding: "8px 16px", borderRadius: 8, fontSize: 12, background: "#fff", color: "#764ba2", border: "none", cursor: "pointer", fontWeight: 700 }}>
                  Open My Bracket
                </button>
              </div>
            )}

            {/* Bracket Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
              <div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#1a1a2e" }}>
                  {bracket._isShared ? (bracket._viewingName || "Shared") + "'s 2026 Bracket" : (userName ? `${userName}'s 2026 Bracket` : "My 2026 Bracket")}
                </div>
                <div style={{ fontSize: 12, color: "#888" }}>{totalPicks} of 63 picks made &middot; {bracket._isShared ? "View only" : "Click a team to advance them"}</div>
              </div>
              {!bracket._isShared && (
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={copyShareLink} style={{ padding: "8px 16px", borderRadius: 8, fontSize: 12, background: totalPicks > 0 ? "#0d6efd" : "#ccc", color: "#fff", border: "none", cursor: totalPicks > 0 ? "pointer" : "default", fontWeight: 600, position: "relative" }}>
                    {showShareMsg ? "Link Copied!" : "Share Bracket"}
                  </button>
                  <button onClick={resetBracket} style={{ padding: "8px 16px", borderRadius: 8, fontSize: 12, background: "#f8d7da", color: "#721c24", border: "none", cursor: "pointer", fontWeight: 600 }}>
                    Reset
                  </button>
                  <button onClick={() => {
                    const printWin = window.open("", "_blank");
                    const regionColors = { East: "#0d6efd", South: "#dc3545", Midwest: "#198754", West: "#6f42c1" };
                    let html = "<!DOCTYPE html><html><head><title>" + (userName || "My") + " 2026 March Madness Bracket</title><style>";
                    html += "body{font-family:'Segoe UI',system-ui,sans-serif;max-width:900px;margin:0 auto;padding:20px;color:#1a1a2e;}";
                    html += "h1{text-align:center;font-size:22px;margin-bottom:4px;}";
                    html += "h2{font-size:16px;margin:16px 0 8px;padding:6px 10px;border-radius:6px;color:#fff;}";
                    html += ".subtitle{text-align:center;font-size:12px;color:#888;margin-bottom:20px;}";
                    html += ".game{display:flex;gap:8px;margin:4px 0;font-size:12px;}";
                    html += ".seed{width:20px;height:20px;border-radius:50%;background:#1a1a2e;color:#fff;text-align:center;line-height:20px;font-size:10px;font-weight:700;flex-shrink:0;}";
                    html += ".winner{font-weight:700;color:#198754;}.loser{color:#aaa;}";
                    html += ".champ{text-align:center;padding:20px;background:linear-gradient(135deg,#ffc107,#ff8c00);border-radius:12px;margin:20px 0;}";
                    html += ".champ-name{font-size:24px;font-weight:800;}.champ-label{font-size:12px;color:#5a4000;margin-bottom:4px;font-weight:600;}";
                    html += "@media print{body{padding:10px;} h2{break-before:auto;}}";
                    html += "</style></head><body>";
                    html += "<h1>" + (userName || "My") + "'s 2026 March Madness Bracket</h1>";
                    html += "<div class='subtitle'>Generated from March Madness Upset Analysis &middot; " + totalPicks + "/63 picks made</div>";
                    if (bracket.champion) {
                      html += "<div class='champ'><div class='champ-label'>NATIONAL CHAMPION</div><div class='champ-name'>(" + bracket.champion.seed + ") " + bracket.champion.team + "</div></div>";
                    }
                    regions.forEach(function(reg) {
                      html += "<h2 style='background:" + regionColors[reg.name] + "'>" + reg.name + " Region</h2>";
                      ["R64","R32","S16","E8"].forEach(function(round) {
                        var roundNames = {R64:"Round of 64",R32:"Round of 32",S16:"Sweet 16",E8:"Elite 8"};
                        var games = bracket[reg.name] && bracket[reg.name][round] ? bracket[reg.name][round] : [];
                        var hasGames = games.some(function(g){return g && g.winner;});
                        if (hasGames) {
                          html += "<div style='margin:6px 0 2px;font-size:11px;color:#888;font-weight:600;'>" + roundNames[round] + "</div>";
                          games.forEach(function(g) {
                            if (g && g.winner && g.a && g.b) {
                              var aWon = g.winner.team === g.a.team;
                              html += "<div class='game'>";
                              html += "<span class='seed'>" + g.a.seed + "</span><span class='" + (aWon ? "winner" : "loser") + "'>" + g.a.team + "</span>";
                              html += "<span style='color:#ccc;'>vs</span>";
                              html += "<span class='seed'>" + g.b.seed + "</span><span class='" + (!aWon ? "winner" : "loser") + "'>" + g.b.team + "</span>";
                              html += "</div>";
                            }
                          });
                        }
                      });
                    });
                    if (bracket.FF && bracket.FF.some(function(g){return g && g.winner;})) {
                      html += "<h2 style='background:#dc3545'>Final Four</h2>";
                      bracket.FF.forEach(function(g,gi) {
                        if (g && g.winner && g.a && g.b) {
                          var aWon = g.winner.team === g.a.team;
                          html += "<div class='game'><span class='seed'>" + g.a.seed + "</span><span class='" + (aWon?"winner":"loser") + "'>" + g.a.team + "</span><span style='color:#ccc;'>vs</span><span class='seed'>" + g.b.seed + "</span><span class='" + (!aWon?"winner":"loser") + "'>" + g.b.team + "</span></div>";
                        }
                      });
                    }
                    if (bracket.CH && bracket.CH[0] && bracket.CH[0].winner) {
                      html += "<h2 style='background:#6f42c1'>Championship</h2>";
                      var g = bracket.CH[0];
                      var aWon = g.winner.team === g.a.team;
                      html += "<div class='game'><span class='seed'>" + g.a.seed + "</span><span class='" + (aWon?"winner":"loser") + "'>" + g.a.team + "</span><span style='color:#ccc;'>vs</span><span class='seed'>" + g.b.seed + "</span><span class='" + (!aWon?"winner":"loser") + "'>" + g.b.team + "</span></div>";
                    }
                    html += "<div style='text-align:center;margin-top:24px;font-size:10px;color:#ccc;'>March Madness Upset Analysis 2026</div>";
                    html += "</body></html>";
                    printWin.document.write(html);
                    printWin.document.close();
                    printWin.focus();
                    setTimeout(function(){ printWin.print(); }, 300);
                  }} style={{ padding: "8px 16px", borderRadius: 8, fontSize: 12, background: totalPicks > 0 ? "#198754" : "#ccc", color: "#fff", border: "none", cursor: totalPicks > 0 ? "pointer" : "default", fontWeight: 600 }}>
                    Print Bracket
                  </button>
                </div>
              )}
            </div>

            {/* Name input */}
            {!bracket._isShared && (
              <div style={{ marginBottom: 16 }}>
                <input
                  type="text"
                  placeholder="Enter your name to personalize your bracket..."
                  value={userName}
                  onChange={(e) => setUserName(e.target.value)}
                  style={{ width: "100%", maxWidth: 320, padding: "8px 12px", borderRadius: 8, border: "2px solid #e0e0e0", fontSize: 13, color: "#333", background: "#fff", outline: "none" }}
                />
              </div>
            )}

            {/* Progress bar */}
            <div style={{ height: 6, background: "#e0e0e0", borderRadius: 3, marginBottom: 20, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${(totalPicks / 63) * 100}%`, background: totalPicks === 63 ? "#198754" : "linear-gradient(90deg, #0d6efd, #6f42c1)", borderRadius: 3, transition: "width 0.3s" }} />
            </div>

            {/* Bracket Confidence Meter */}
            {totalPicks > 0 && (() => {
              // Compute bracket code from user picks
              const userCode = (() => {
                let code = "";
                regions.forEach((reg, ri) => {
                  ["R64","R32","S16","E8"].forEach(round => {
                    (bracket[reg.name] && bracket[reg.name][round] ? bracket[reg.name][round] : []).forEach(game => {
                      if (game && game.winner) {
                        code += game.winner.team === (game.a ? game.a.team : null) ? "a" : "b";
                      } else {
                        code += "_";
                      }
                    });
                  });
                });
                (bracket.FF || []).forEach(game => {
                  if (game && game.winner) {
                    code += game.winner.team === (game.a ? game.a.team : null) ? "a" : "b";
                  } else {
                    code += "_";
                  }
                });
                (bracket.CH || []).forEach(game => {
                  if (game && game.winner) {
                    code += game.winner.team === (game.a ? game.a.team : null) ? "a" : "b";
                  } else {
                    code += "_";
                  }
                });
                return code;
              })();

              // Compare user picks vs AI picks
              let agree = 0, disagree = 0, upsets = 0, chalk = 0;
              const riskyPicks = [];
              const smartPicks = [];

              // Historical upset rates by seed matchup in R64
              const upsetRates = { "16v1": 3, "9v8": 44, "12v5": 36, "13v4": 22, "11v6": 38, "14v3": 8, "10v7": 30, "15v2": 8 };

              for (let i = 0; i < Math.min(userCode.length, AI_BRACKET_CODE.length); i++) {
                if (userCode[i] === "_") continue;
                if (userCode[i] === AI_BRACKET_CODE[i]) agree++;
                else disagree++;
                // R64 picks: check if user picked the lower seed
                if (i < 32) {
                  if (userCode[i] === "b") upsets++;
                  else chalk++;
                }
              }

              const totalMade = agree + disagree;
              const aiAgreePct = totalMade > 0 ? Math.round((agree / totalMade) * 100) : 0;
              const chalkPct = (chalk + upsets) > 0 ? Math.round((chalk / (chalk + upsets)) * 100) : 0;
              const confidenceScore = Math.round(aiAgreePct * 0.6 + (100 - Math.abs(chalkPct - 65)) * 0.4);
              const confColor = confidenceScore >= 70 ? "#198754" : confidenceScore >= 45 ? "#ffc107" : "#dc3545";
              const confLabel = confidenceScore >= 70 ? "Strong" : confidenceScore >= 45 ? "Moderate" : "Risky";

              return (
                <div style={{ background: "#fff", borderRadius: 12, padding: 16, marginBottom: 20, boxShadow: "0 2px 6px rgba(0,0,0,0.06)" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                    <h3 style={{ fontSize: 15, fontWeight: 700, color: "#1a1a2e", margin: 0, flex: 1 }}>Bracket Confidence Meter</h3>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 48, height: 48, borderRadius: "50%", background: confColor, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 16 }}>{confidenceScore}</div>
                      <div style={{ fontSize: 11, color: confColor, fontWeight: 700 }}>{confLabel}</div>
                    </div>
                  </div>

                  <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: 8, marginBottom: 12 }}>
                    <div style={{ padding: 10, borderRadius: 8, background: "#e8f4fd", textAlign: "center" }}>
                      <div style={{ fontSize: 20, fontWeight: 800, color: "#0d6efd" }}>{agree}</div>
                      <div style={{ fontSize: 10, color: "#666" }}>Agree with AI</div>
                    </div>
                    <div style={{ padding: 10, borderRadius: 8, background: "#fde8e8", textAlign: "center" }}>
                      <div style={{ fontSize: 20, fontWeight: 800, color: "#dc3545" }}>{disagree}</div>
                      <div style={{ fontSize: 10, color: "#666" }}>Disagree with AI</div>
                    </div>
                    <div style={{ padding: 10, borderRadius: 8, background: "#d4edda", textAlign: "center" }}>
                      <div style={{ fontSize: 20, fontWeight: 800, color: "#198754" }}>{chalk}</div>
                      <div style={{ fontSize: 10, color: "#666" }}>Chalk picks (R64)</div>
                    </div>
                    <div style={{ padding: 10, borderRadius: 8, background: "#fff3e0", textAlign: "center" }}>
                      <div style={{ fontSize: 20, fontWeight: 800, color: "#e67e22" }}>{upsets}</div>
                      <div style={{ fontSize: 10, color: "#666" }}>Upsets picked (R64)</div>
                    </div>
                  </div>

                  {/* AI agreement bar */}
                  <div style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#666", marginBottom: 3 }}>
                      <span>AI Agreement</span>
                      <span>{aiAgreePct}%</span>
                    </div>
                    <div style={{ height: 8, background: "#e9ecef", borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: aiAgreePct + "%", background: aiAgreePct > 70 ? "#198754" : aiAgreePct > 40 ? "#ffc107" : "#dc3545", borderRadius: 4, transition: "width 0.3s" }} />
                    </div>
                  </div>

                  {/* Chalk meter */}
                  <div style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#666", marginBottom: 3 }}>
                      <span>Chalk-o-Meter (R64)</span>
                      <span>{chalkPct}% chalk</span>
                    </div>
                    <div style={{ height: 8, background: "#e9ecef", borderRadius: 4, overflow: "hidden", position: "relative" }}>
                      <div style={{ height: "100%", width: chalkPct + "%", background: chalkPct > 85 ? "#dc3545" : chalkPct > 60 ? "#198754" : "#ffc107", borderRadius: 4, transition: "width 0.3s" }} />
                      {/* Sweet spot marker at 65% */}
                      <div style={{ position: "absolute", top: -2, left: "65%", width: 2, height: 12, background: "#333", borderRadius: 1 }} />
                    </div>
                    <div style={{ fontSize: 9, color: "#999", marginTop: 2 }}>Sweet spot: ~65% chalk. Too much = boring. Too little = reckless.</div>
                  </div>

                  <div style={{ fontSize: 11, color: "#666", lineHeight: 1.5, padding: "8px 10px", background: "#f8f9fa", borderRadius: 6 }}>
                    <strong>Score breakdown:</strong> 60% weighted on AI agreement (data-driven picks) + 40% on chalk balance (historical sweet spot is ~65% favorites in R64). A score of 70+ means your bracket is well-calibrated. Below 45 means you're either too chalky or too contrarian.
                  </div>
                </div>
              );
            })()}

            {/* Region brackets */}
            {regions.map((reg, ri) => {
              const regData = bracket[reg.name];
              const regPicks = regData.R64.filter(g => g.winner).length
                + regData.R32.filter(g => g && g.winner).length
                + regData.S16.filter(g => g && g.winner).length
                + (regData.E8[0] && regData.E8[0].winner ? 1 : 0);
              return (
                <div key={ri} style={{ marginBottom: 20, borderRadius: 12, overflow: "hidden", border: `2px solid ${regionColors[reg.name]}` }}>
                  <div style={{ padding: "10px 14px", background: regionColors[reg.name], color: "#fff", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>{reg.name} Region <span style={{ fontWeight: 400, opacity: 0.8 }}>({reg.site})</span></div>
                    <div style={{ fontSize: 11, opacity: 0.8 }}>{regPicks}/15 picks</div>
                  </div>
                  <div style={{ padding: isMobile ? 8 : 12, background: regionBgs[reg.name] }}>
                    {/* R64 */}
                    <div style={{ marginBottom: 12 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", marginBottom: 6 }}>Round of 64</div>
                      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 6 }}>
                        {regData.R64.map((game, gi) => (
                          <GameCard key={gi} game={game} roundKey="R64" onPick={(team) => pickWinner(reg.name, "R64", gi, team)} />
                        ))}
                      </div>
                    </div>
                    {/* R32 */}
                    {regData.R32.some(g => g && (g.a || g.b)) && (
                      <div style={{ marginBottom: 12 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", marginBottom: 6 }}>Round of 32</div>
                        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 6 }}>
                          {regData.R32.map((game, gi) => (
                            <GameCard key={gi} game={game} roundKey="R32" onPick={(team) => pickWinner(reg.name, "R32", gi, team)} />
                          ))}
                        </div>
                      </div>
                    )}
                    {/* S16 */}
                    {regData.S16.some(g => g && (g.a || g.b)) && (
                      <div style={{ marginBottom: 12 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", marginBottom: 6 }}>Sweet 16</div>
                        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 6 }}>
                          {regData.S16.map((game, gi) => (
                            <GameCard key={gi} game={game} roundKey="S16" onPick={(team) => pickWinner(reg.name, "S16", gi, team)} />
                          ))}
                        </div>
                      </div>
                    )}
                    {/* E8 */}
                    {regData.E8[0] && (regData.E8[0].a || regData.E8[0].b) && (
                      <div>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", marginBottom: 6 }}>Elite 8 — Region Champion</div>
                        <div style={{ maxWidth: 300 }}>
                          <GameCard game={regData.E8[0]} roundKey="E8" onPick={(team) => pickWinner(reg.name, "E8", 0, team)} />
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}

            {/* Final Four */}
            {bracket.FF.some(g => g && (g.a || g.b)) && (
              <div style={{ marginBottom: 20, borderRadius: 12, overflow: "hidden", border: "2px solid #e94560" }}>
                <div style={{ padding: "10px 14px", background: "linear-gradient(135deg, #e94560 0%, #6f42c1 100%)", color: "#fff", fontWeight: 700, fontSize: 14 }}>
                  Final Four
                </div>
                <div style={{ padding: isMobile ? 8 : 12, background: "#fef3f5" }}>
                  <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 6 }}>
                    {bracket.FF.map((game, gi) => (
                      <div key={gi}>
                        <div style={{ fontSize: 10, color: "#888", marginBottom: 4, fontWeight: 600 }}>
                          {gi === 0 ? "East / South" : "Midwest / West"}
                        </div>
                        <GameCard game={game} roundKey="FF" onPick={(team) => pickWinner(null, "FF", gi, team)} />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Championship */}
            {bracket.CH[0] && (bracket.CH[0].a || bracket.CH[0].b) && (
              <div style={{ marginBottom: 20, borderRadius: 12, overflow: "hidden", border: "3px solid #ffc107" }}>
                <div style={{ padding: "12px 14px", background: "linear-gradient(135deg, #ffc107 0%, #ff8c00 100%)", color: "#1a1a2e", fontWeight: 800, fontSize: 16, textAlign: "center" }}>
                  National Championship
                </div>
                <div style={{ padding: 16, background: "#fffdf0", display: "flex", justifyContent: "center" }}>
                  <div style={{ maxWidth: 300, width: "100%" }}>
                    <GameCard game={bracket.CH[0]} roundKey="CH" onPick={(team) => pickWinner(null, "CH", 0, team)} />
                  </div>
                </div>
              </div>
            )}

            {/* Champion Display */}
            {bracket.champion && (
              <div style={{ textAlign: "center", padding: 24, background: "linear-gradient(135deg, #ffc107 0%, #ff8c00 50%, #ffc107 100%)", borderRadius: 16, marginBottom: 20 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#5a4000", marginBottom: 4 }}>YOUR 2026 NATIONAL CHAMPION</div>
                <div style={{ fontSize: 28, fontWeight: 800, color: "#1a1a2e" }}>
                  ({bracket.champion.seed}) {bracket.champion.team}
                </div>
                <div style={{ marginTop: 8, fontSize: 12, color: "#5a4000" }}>Cut down the nets!</div>
              </div>
            )}

            <div style={{ padding: 14, background: "#e8f4fd", borderRadius: 10, fontSize: 12, lineHeight: 1.6, color: "#0c5460" }}>
              <strong>How it works:</strong> Click a team name to advance them to the next round. Your bracket auto-fills as you pick winners. Use the "2026 Picks" tab for data-driven upset suggestions. Reset anytime to start over.
            </div>
          </div>
        );
      })()}

      {/* SCORES VIEW */}
      {view === "scores" && (() => {
        // Parse actualResultsCode into game results
        // Format: East(8 R64 + 4 R32 + 2 S16 + 1 E8 = 15) + South(15) + Midwest(15) + West(15) + FF(2) + CH(1) = 63
        const roundStructure = [
          { round: "R64", games: 8 },
          { round: "R32", games: 4 },
          { round: "S16", games: 2 },
          { round: "E8", games: 1 },
        ];
        const regionNames = ["East", "South", "Midwest", "West"];
        const regionColors = { East: "#0d6efd", South: "#dc3545", Midwest: "#198754", West: "#6f42c1" };
        const regionBgs = { East: "#e8f0fe", South: "#fde8e8", Midwest: "#e8f5e9", West: "#f3e8fd" };
        const roundNames = { R64: "Round of 64", R32: "Round of 32", S16: "Sweet 16", E8: "Elite 8", FF: "Final Four", CH: "Championship" };

        // Build game schedule with results
        const allGames = [];
        let codeIdx = 0;
        regions.forEach((reg, ri) => {
          // R64: 8 games per region
          reg.matchups.forEach((m, mi) => {
            const result = actualResultsCode[codeIdx] || "_";
            const winner = result === "a" ? { team: m.hiTeam, seed: m.hi } : result === "b" ? { team: m.loTeam, seed: m.lo } : null;
            const isUpset = result === "b";
            allGames.push({ round: "R64", region: reg.name, teamA: { team: m.hiTeam, seed: m.hi }, teamB: { team: m.loTeam, seed: m.lo }, result, winner, isUpset, codeIdx });
            codeIdx++;
          });
          // R32: 4 games
          for (let i = 0; i < 4; i++) {
            const result = actualResultsCode[codeIdx] || "_";
            allGames.push({ round: "R32", region: reg.name, teamA: null, teamB: null, result, winner: null, isUpset: result === "b", codeIdx });
            codeIdx++;
          }
          // S16: 2 games
          for (let i = 0; i < 2; i++) {
            const result = actualResultsCode[codeIdx] || "_";
            allGames.push({ round: "S16", region: reg.name, teamA: null, teamB: null, result, winner: null, isUpset: result === "b", codeIdx });
            codeIdx++;
          }
          // E8: 1 game
          const e8Result = actualResultsCode[codeIdx] || "_";
          allGames.push({ round: "E8", region: reg.name, teamA: null, teamB: null, result: e8Result, winner: null, isUpset: e8Result === "b", codeIdx });
          codeIdx++;
        });
        // FF: 2 games
        for (let i = 0; i < 2; i++) {
          const result = actualResultsCode[codeIdx] || "_";
          allGames.push({ round: "FF", region: i === 0 ? "East/South" : "Midwest/West", teamA: null, teamB: null, result, winner: null, isUpset: result === "b", codeIdx });
          codeIdx++;
        }
        // CH: 1 game
        const chResult = actualResultsCode[codeIdx] || "_";
        allGames.push({ round: "CH", region: "Championship", teamA: null, teamB: null, result: chResult, winner: null, isUpset: chResult === "b", codeIdx });

        const gamesCompleted = actualResultsCode.replace(/_/g, "").length;
        const upsetCount = allGames.filter(g => g.isUpset && g.result !== "_").length;

        // Group completed R64 games by region
        const r64Games = allGames.filter(g => g.round === "R64");
        const completedR64 = r64Games.filter(g => g.result !== "_");
        const currentRound = gamesCompleted === 0 ? "R64" : gamesCompleted <= 32 ? "R64" : gamesCompleted <= 48 ? "R32" : gamesCompleted <= 56 ? "S16" : gamesCompleted <= 60 ? "E8" : gamesCompleted <= 62 ? "FF" : "CH";

        return (
          <div>
            {/* Tournament status header */}
            <div style={{ background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)", borderRadius: 12, padding: 20, marginBottom: 16, color: "#fff" }}>
              <div style={{ textAlign: "center", marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.5, color: "#aaa", marginBottom: 4 }}>2026 NCAA Tournament</div>
                <div style={{ fontSize: 22, fontWeight: 800 }}>{gamesCompleted === 0 ? "Tournament Starts March 20" : gamesCompleted === 63 ? "Tournament Complete!" : roundNames[currentRound] + " In Progress"}</div>
              </div>
              <div style={{ display: "flex", justifyContent: "center", gap: isMobile ? 12 : 24, flexWrap: "wrap" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#0d6efd" }}>{gamesCompleted}</div>
                  <div style={{ fontSize: 10, color: "#aaa" }}>Games Played</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#ffc107" }}>{63 - gamesCompleted}</div>
                  <div style={{ fontSize: 10, color: "#aaa" }}>Remaining</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#dc3545" }}>{upsetCount}</div>
                  <div style={{ fontSize: 10, color: "#aaa" }}>Upsets</div>
                </div>
              </div>
              {/* Progress */}
              <div style={{ marginTop: 12 }}>
                <div style={{ display: "flex", gap: 3, justifyContent: "center" }}>
                  {["R64", "R32", "S16", "E8", "FF", "CH"].map(r => {
                    const total = r === "R64" ? 32 : r === "R32" ? 16 : r === "S16" ? 8 : r === "E8" ? 4 : r === "FF" ? 2 : 1;
                    const played = allGames.filter(g => g.round === r && g.result !== "_").length;
                    const active = currentRound === r && gamesCompleted > 0;
                    return (
                      <div key={r} style={{ flex: 1, textAlign: "center" }}>
                        <div style={{ height: 4, borderRadius: 2, background: played === total ? "#198754" : active ? "#ffc107" : "#333", marginBottom: 4, transition: "background 0.3s" }} />
                        <div style={{ fontSize: 9, color: played === total ? "#198754" : active ? "#ffc107" : "#666", fontWeight: active ? 700 : 500 }}>{roundNames[r]}</div>
                        <div style={{ fontSize: 8, color: "#666" }}>{played}/{total}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {gamesCompleted === 0 ? (
              <div>
                {/* Pre-tournament: show all R64 matchups by day, sorted by time */}
                <div style={{ padding: 14, background: "#fff3cd", borderRadius: 10, marginBottom: 16, fontSize: 12, color: "#856404", textAlign: "center" }}>
                  No games have been played yet. Scores auto-update every 5 minutes via ESPN once the tournament begins. All times Eastern.
                </div>

                {(() => {
                  // Flatten all matchups with region info, split by day
                  const allMatchups = [];
                  regions.forEach(reg => {
                    reg.matchups.forEach(m => {
                      allMatchups.push({ ...m, region: reg.name });
                    });
                  });
                  const thuGames = allMatchups.filter(m => m.time && m.time.startsWith("Thu"));
                  const friGames = allMatchups.filter(m => m.time && m.time.startsWith("Fri"));
                  // Sort by time
                  const parseTime = (t) => {
                    if (!t) return 999;
                    const parts = t.replace("Thu ", "").replace("Fri ", "").match(/(\d+):(\d+)\s*(AM|PM)/);
                    if (!parts) return 999;
                    let h = parseInt(parts[1]); const min = parseInt(parts[2]); const ampm = parts[3];
                    if (ampm === "PM" && h !== 12) h += 12;
                    if (ampm === "AM" && h === 12) h = 0;
                    return h * 60 + min;
                  };
                  thuGames.sort((a, b) => parseTime(a.time) - parseTime(b.time));
                  friGames.sort((a, b) => parseTime(a.time) - parseTime(b.time));

                  const tvColors = { CBS: "#0d6efd", TNT: "#dc3545", TBS: "#198754", truTV: "#6f42c1" };

                  const renderGame = (m, mi, arr) => (
                    <div key={mi} style={{ display: "flex", alignItems: "center", padding: isMobile ? "10px 8px" : "10px 14px", borderBottom: mi < arr.length - 1 ? "1px solid #f0f0f0" : "none", gap: isMobile ? 6 : 10 }}>
                      {/* Time + TV */}
                      <div style={{ width: isMobile ? 55 : 70, flexShrink: 0, textAlign: "center" }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#1a1a2e" }}>{(m.time || "").replace("Thu ", "").replace("Fri ", "")}</div>
                        <div style={{ fontSize: 9, fontWeight: 700, color: tvColors[m.tv] || "#888", marginTop: 1 }}>{m.tv}</div>
                      </div>
                      {/* Teams */}
                      <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 3 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#1a1a2e", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 800, flexShrink: 0 }}>{m.hi}</div>
                          <span style={{ fontSize: 13, fontWeight: 600, color: "#1a1a2e" }}>{m.hiTeam}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#555", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 800, flexShrink: 0 }}>{m.lo}</div>
                          <span style={{ fontSize: 13, fontWeight: 500, color: "#555" }}>{m.loTeam}</span>
                        </div>
                      </div>
                      {/* Region + City */}
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: regionColors[m.region] }}>{m.region}</div>
                        <div style={{ fontSize: 9, color: "#aaa" }}>{m.city}</div>
                      </div>
                    </div>
                  );

                  return (
                    <div>
                      {[{ label: "Thursday, March 19", games: thuGames }, { label: "Friday, March 20", games: friGames }].map((day, di) => (
                        <div key={di} style={{ marginBottom: 16 }}>
                          <div style={{ padding: "10px 14px", borderRadius: "10px 10px 0 0", background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)", color: "#fff", fontWeight: 700, fontSize: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <span>{day.label}</span>
                            <span style={{ fontSize: 11, fontWeight: 400, opacity: 0.7 }}>{day.games.length} games</span>
                          </div>
                          <div style={{ background: "#fff", borderRadius: "0 0 10px 10px", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                            {day.games.map((m, mi) => renderGame(m, mi, day.games))}
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
            ) : (
              <div>
                {/* Games in progress / completed: show results by round */}
                {["R64", "R32", "S16", "E8", "FF", "CH"].map(round => {
                  const roundGames = allGames.filter(g => g.round === round);
                  const played = roundGames.filter(g => g.result !== "_");
                  if (played.length === 0 && round !== currentRound) return null;

                  // Group by region for R64-E8
                  const byRegion = {};
                  roundGames.forEach(g => {
                    if (!byRegion[g.region]) byRegion[g.region] = [];
                    byRegion[g.region].push(g);
                  });

                  return (
                    <div key={round} style={{ marginBottom: 20 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: played.length === roundGames.length ? "#198754" : played.length > 0 ? "#ffc107" : "#ccc" }} />
                        <h3 style={{ fontSize: 16, fontWeight: 700, color: "#1a1a2e", margin: 0 }}>{roundNames[round]}</h3>
                        <span style={{ fontSize: 11, color: "#888" }}>{played.length}/{roundGames.length} games</span>
                        {played.filter(g => g.isUpset).length > 0 && (
                          <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 6, background: "#fde8e8", color: "#dc3545", fontWeight: 700 }}>{played.filter(g => g.isUpset).length} upset{played.filter(g => g.isUpset).length > 1 ? "s" : ""}</span>
                        )}
                      </div>

                      {Object.entries(byRegion).map(([regName, games]) => (
                        <div key={regName} style={{ marginBottom: 10 }}>
                          {round !== "CH" && (
                            <div style={{ fontSize: 11, fontWeight: 700, color: regionColors[regName] || "#888", marginBottom: 4, paddingLeft: 4 }}>{regName}</div>
                          )}
                          <div style={{ background: "#fff", borderRadius: 8, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", overflow: "hidden" }}>
                            {games.map((g, gi) => {
                              if (g.result === "_") {
                                return (
                                  <div key={gi} style={{ padding: "8px 12px", borderBottom: gi < games.length - 1 ? "1px solid #f0f0f0" : "none", color: "#ccc", fontSize: 12, textAlign: "center" }}>
                                    Upcoming
                                  </div>
                                );
                              }
                              if (!g.teamA) {
                                return (
                                  <div key={gi} style={{ padding: "8px 12px", borderBottom: gi < games.length - 1 ? "1px solid #f0f0f0" : "none", fontSize: 12 }}>
                                    <span style={{ color: "#198754", fontWeight: 700 }}>Winner decided</span>
                                    {g.isUpset && <span style={{ marginLeft: 8, fontSize: 10, padding: "2px 6px", borderRadius: 4, background: "#fde8e8", color: "#dc3545", fontWeight: 700 }}>UPSET</span>}
                                  </div>
                                );
                              }
                              const winnerTeam = g.result === "a" ? g.teamA : g.teamB;
                              const loserTeam = g.result === "a" ? g.teamB : g.teamA;
                              return (
                                <div key={gi} style={{ display: "flex", alignItems: "center", padding: "10px 12px", borderBottom: gi < games.length - 1 ? "1px solid #f0f0f0" : "none", background: g.isUpset ? "#fffbf0" : "transparent" }}>
                                  <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6 }}>
                                    <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#198754", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 800 }}>{winnerTeam.seed}</div>
                                    <span style={{ fontSize: 13, fontWeight: 700, color: "#198754" }}>{winnerTeam.team}</span>
                                  </div>
                                  <div style={{ fontSize: 9, fontWeight: 700, color: "#198754", padding: "2px 8px", background: "#d4edda", borderRadius: 4 }}>FINAL</div>
                                  <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
                                    <span style={{ fontSize: 12, color: "#aaa" }}>{loserTeam.team}</span>
                                    <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#e0e0e0", color: "#888", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700 }}>{loserTeam.seed}</div>
                                  </div>
                                  {g.isUpset && <span style={{ marginLeft: 8, fontSize: 9, padding: "2px 6px", borderRadius: 4, background: "#fde8e8", color: "#dc3545", fontWeight: 700, flexShrink: 0 }}>UPSET</span>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}

            <div style={{ padding: 14, background: "#e8f4fd", borderRadius: 10, fontSize: 12, lineHeight: 1.6, color: "#0c5460" }}>
              <strong>Auto-updates:</strong> Scores are updated automatically by the ESPN scheduled task. The task checks for new results and updates the bracket code. Upsets (lower seed wins) are highlighted in red. Check back during games for live-ish updates.
            </div>
          </div>
        );
      })()}

      {/* Footer */}
      <div style={{ marginTop: 32, paddingTop: 16, borderTop: "1px solid #e0e0e0", textAlign: "center" }}>
        <div style={{ fontSize: 11, color: "#aaa", lineHeight: 1.6 }}>
          March Madness Upset Analysis &middot; Data: 2016-2025 NCAA Tournaments &middot; 2026 Official NCAA Tournament Bracket
        </div>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
