                      <div style={{ fontSize: 13, fontWeight: 600 }}>{p.teams.join(" / ")}</div>
                    </div>
                    <div style={{ padding: "3px 10px", borderRadius: 12, background: riskBg[p.risk], color: riskColors[p.risk], fontSize: 11, fontWeight: 700, textTransform: "uppercase" }}>
                      {p.risk} upset risk
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: "#666", marginLeft: 42, lineHeight: 1.5 }}>{p.note}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Quick Pick Suggestions */}
          <div style={{ marginBottom: 20 }}>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: "#1a1a2e", marginBottom: 12 }}>Quick Pick Suggestions for 2026</h3>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div style={{ background: "#d4edda", borderRadius: 10, padding: 14 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#155724", marginBottom: 6 }}>Safe Picks</div>
                <div style={{ fontSize: 12, color: "#155724", lineHeight: 1.7 }}>
                  Duke, Florida, Michigan, Arizona to Elite 8 (drop 1)<br/>
                  Iowa State, Houston, UConn, Michigan St win R64<br/>
                  Illinois & Purdue to the Sweet 16<br/>
                  Kentucky or Saint Mary's on a Sweet 16 run
                </div>
              </div>
              <div style={{ background: "#f8d7da", borderRadius: 10, padding: 14 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#721c24", marginBottom: 6 }}>Upset Picks</div>
                <div style={{ fontSize: 12, color: "#721c24", lineHeight: 1.7 }}>
                  Yale over Texas Tech or McNeese over Arkansas<br/>
                  VCU over Tennessee or S. Florida over UNC<br/>
                  TCU/Villanova to upset a 1-seed in R32<br/>
                  Northern Iowa or Hofstra over their 4-seed
                </div>
              </div>
              <div style={{ background: "#e2d5f1", borderRadius: 10, padding: 14 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#4a1d8e", marginBottom: 6 }}>Cinderella Picks</div>
                <div style={{ fontSize: 12, color: "#4a1d8e", lineHeight: 1.7 }}>
                  VCU or NC State to the Sweet 16<br/>
                  TCU or Villanova (8/9) to the Elite 8<br/>
                  Yale has the profile of a Cinderella (smart, senior-led)<br/>
                  UMBC has March magic history
                </div>
              </div>
              <div style={{ background: "#fff3cd", borderRadius: 10, padding: 14 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#856404", marginBottom: 6 }}>Champion Profile</div>
                <div style={{ fontSize: 12, color: "#856404", lineHeight: 1.7 }}>
                  7 of 9 champs were 1 or 2 seeds<br/>
                  Duke & Houston fit the elite defense profile<br/>
                  UConn won it as a 4-seed in 2023 (repeat run?)<br/>
                  Florida won in 2025 as a 3 - now a 1-seed threat
                </div>
              </div>
            </div>
          </div>

          <div style={{ padding: 14, background: "#e8f4fd", borderRadius: 10, fontSize: 12, lineHeight: 1.6, color: "#0c5460" }}>
            <strong>Source:</strong> ESPN Bracketology by Joe Lunardi, updated 3/15/26 2:15am ET. The official bracket is revealed at 6 PM ET on CBS. Lunardi's final update will post during Sunday's conference championship games. First Four games begin March 17, Round of 64 starts March 19.
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{ marginTop: 32, paddingTop: 16, borderTop: "1px solid #e0e0e0", textAlign: "center" }}>
        <div style={{ fontSize: 11, color: "#aaa", lineHeight: 1.6 }}>
          March Madness Upset Analysis &middot; Data: 2016-2025 NCAA Tournaments &middot; 2026 projections via ESPN Bracketology (Joe Lunardi)
        </div>
      </div>
    </div>
  );
}
